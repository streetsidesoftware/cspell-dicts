name: Add Words to a Dictionary
description: Submit one or more words to add to an existing dictionary. A workflow will try to open a PR automatically (proof-of-concept).
title: '[Words]: '
labels:
  - dictionary-words
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request new words for an **existing** dictionary under [`dictionaries/`](https://github.com/streetsidesoftware/cspell-dicts/tree/main/dictionaries).

        This is a proof-of-concept: a workflow will try to add your word(s) to the dictionary's source file and open a **pull request** automatically. If it can't (e.g. the dictionary name doesn't match, or the dictionary has multiple source files), it will leave a comment explaining why - in that case, please open a pull request manually instead.
  - type: input
    id: dictionary
    attributes:
      label: Dictionary
      description: The folder name of the dictionary under `dictionaries/` (case-sensitive).
      placeholder: git
    validations:
      required: true
  - type: textarea
    id: words
    attributes:
      label: Words
      description: One word per line. Please only submit words that belong in this single dictionary.
      placeholder: |
        gitops
        gitflow
        gitlabci
    validations:
      required: true
# cspell:ignore gitops gitflow gitlabci
